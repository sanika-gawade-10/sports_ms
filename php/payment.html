<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="paymentt.css">
</head>
<body>
    <div class="payment-form">
        <h1>Payment Details</h1>
        <form id="paymentForm" action="process_payment.php" method="post">
            <label for="card_number">Card Number:</label>
            <input type="text" id="card_number" name="card_number" placeholder="Enter card number" maxlength="19" required>
            
            <label for="expiry">Expiry Date:</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YYYY" maxlength="7" required>
            
            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" placeholder="CVV" maxlength="3" required>
            
            <label for="amount">Amount:</label>
            <input type="text" id="amount" name="amount" placeholder="Amount" required>
            
            <button type="submit">Pay Now</button>
        </form>
    </div>
    <script src="payment.js"></script>
</body>
</html>
