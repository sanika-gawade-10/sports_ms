<!DOCTYPE html>
<html>
<head>
<title>All Achievements</title>

<style>
body{
  font-family:'Segoe UI';
  background:#f4f6f8;
  padding:40px;
}

h1{
  text-align:center;
  color:#1e3a8a;
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
}

.card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  color:white;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}
</style>
</head>

<body>

<h1>🏆 All Achievements</h1>

<div class="grid" id="grid"></div>

<script>
let achievements = JSON.parse(localStorage.getItem("achievements")) || [];

let grid = document.getElementById("grid");

achievements.forEach(a=>{
  grid.innerHTML += `
    <div class="card">
      <img src="${a.img.split('/').pop()}">
      <div class="overlay">
        <h3>${a.name}</h3>
        <p>${a.text}</p>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
